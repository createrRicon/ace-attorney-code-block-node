<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景测试</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .test { margin-bottom: 20px; padding: 20px; border: 1px solid #ccc; }
        img { max-width: 100%; border: 1px solid red; }
    </style>
</head>
<body>
    <h1>背景图片测试</h1>

    <div class="test">
        <h2>法庭背景 (使用 /assets/backgrounds/courtroom.png)</h2>
        <img src="/assets/backgrounds/courtroom.png" alt="法庭背景" onerror="this.parentElement.innerHTML='加载失败'">
    </div>

    <div class="test">
        <h2>会议室背景</h2>
        <img src="/assets/backgrounds/meeting-room.png" alt="会议室背景">
    </div>

    <div class="test">
        <h2>办公室背景</h2>
        <img src="/assets/backgrounds/office.png" alt="办公室背景">
    </div>

    <div id="status"></div>

    <script>
        const status = document.getElementById('status');
        const images = document.querySelectorAll('img');
        let loadedCount = 0;

        images.forEach(img => {
            img.onload = () => {
                loadedCount++;
                status.innerHTML = `✓ 图片加载成功: ${loadedCount}/${images.length}`;
            };
            img.onerror = () => {
                status.innerHTML = `✗ 图片加载失败`;
            };
        });

        // 显示当前路径
        status.innerHTML += `<br>当前路径: ${window.location.href}`;
    </script>
</body>
</html>
